    <h2> 📑 Upload Prescription</h2>
    <p>Upload your prescription image or PDF to extract medicine details automatically.</p>

    <div id="drop-area">
      <div class="icon">📋</div>
      <p class="area-text-main">Drop your prescription here</p>
<p class="area-text-note">(Supported: JPG, PNG, PDF | Max size: 10MB)</p>

      <input type="file" id="fileElem" accept=".jpg,.png,.pdf" hidden>
      <button id="fileSelect">Choose File</button>
    </div>

    <div id="result"></div>
  </div>

  <app src="app.js"></app>
